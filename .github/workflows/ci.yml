name: CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

# This workflow intentionally has NO top-level `concurrency` group. A shared
# group serializes the whole workflow, but GitHub keeps only the newest queued
# run per group and cancels older pending ones — so two PRs pushed seconds apart
# silently drop each other's CI. Instead, the cheap `check`/`security` jobs run
# in parallel across PRs (never cancelled), and only `start-runner` serializes —
# it waits for older runs via ahmadnassri/action-workflow-queue so the single
# whitelisted Elastic IP is never associated by two EC2 runners at once. See the
# queue step in start-runner below.

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Go minor from go.mod
        id: gomod
        # Extract just the MAJOR.MINOR (e.g. 1.26) from go.mod's `go` directive.
        # Passing the full patch (1.26.3) to setup-go pins it exactly even with
        # check-latest; the minor lets check-latest float to the newest patch.
        run: echo "minor=$(awk '/^go / {print $2; exit}' go.mod | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Latest patch of go.mod's Go minor (e.g. 1.26 -> 1.26.4) rather than
          # a cached or exact-pinned patch, so the check job tests the newest.
          go-version: ${{ steps.gomod.outputs.minor }}
          check-latest: true

      - name: Verify module integrity
        run: go mod verify

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check
        run: make check

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

      - name: Test
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    # Trivy scan covers three concerns in one job:
    #  - SCA: CVEs in Go dependencies declared by go.mod / go.sum.
    #  - IaC: misconfigurations in any Terraform or YAML at the
    #    repo root (examples/, .github/workflows/, etc.).
    #  - Secret scan: accidental tokens or keys checked into the tree.
    # A separate step emits a CycloneDX SBOM as a workflow artifact so
    # downstream tooling (dependency-track, release provenance, legal
    # audits) can consume a signed inventory without re-running scans.
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy vuln + misconfig + secret + license scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret,license
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          # License denylist lives in trivy.yaml at repo root; the
          # action auto-loads it before each scanner runs.
          trivy-config: trivy.yaml
          # trivy-action v0.36.0 uses actions/cache@v5 (Node 24) internally.
          cache: "true"

      - name: Generate CycloneDX SBOM
        # Runs even if the scan above found HIGH/CRITICAL — the SBOM is
        # a static inventory and should be produced regardless of
        # gating outcome so consumers can see what went into the tree.
        if: ${{ !cancelled() }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          cache: "true"

      - name: Upload SBOM artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

  start-runner:
    name: Start self-hosted EC2 runner
    needs: [check, security]
    # Dependabot-triggered runs don't have access to secrets.* (GitHub
    # redacts them for dependabot[bot]), so start-runner and the
    # acceptance test would fail at "Configure AWS credentials". Skip
    # those jobs for Dependabot; the check job still runs on its PRs.
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # action-workflow-queue lists workflow runs to wait on
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - name: Wait for older acceptance runs to release the EIP
        # The acceptance pipeline associates one whitelisted Elastic IP to its
        # ephemeral EC2 runner; two runners at once would fight over that IP.
        # Queue this run (FIFO, no cancellation) behind any older in-progress CI
        # run, which holds the IP until its stop-runner job terminates the host.
        uses: ahmadnassri/action-workflow-queue@542658b3a8270cac81ae15d401b0d974732808ac # v1.2.0
        with:
          timeout: 1800000 # 30 min cap for a backlog of queued acceptance runs
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Start EC2 runner
        id: start-ec2-runner
        uses: namecheap/ec2-github-runner@ee454b5f2ada8a0a3c6b3b5e48f3275068254428 # v3.0.0 @ 2026-06-09
        with:
          mode: start
          github-token: ${{ steps.app-token.outputs.token }}
          ec2-image-owner: 699717368611
          ec2-image-filters: >
            [
              { "Name": "name", "Values": ["nc-al2023-ami-hvm-x86_64-master-*"] }
            ]
          ec2-instance-type: t3.medium
          subnet-id: subnet-01c4ff5a
          security-group-id: sg-106ec76d
          eip-allocation-id: eipalloc-1796f61b
          iam-role-name: AmazonSSMRoleForInstancesQuickSetup
          # SSE-EBS on the runner's root volume. Uses the launch
          # account's default aws/ebs KMS key; AMI snapshot-id is
          # dropped so AWS re-encrypts at launch time.
          encrypt-ebs: "true"
          aws-resource-tags: >
            [
              { "Key": "Name", "Value": "github_runner" },
              { "Key": "GitHubRepository", "Value": "${{ github.repository }}" }
            ]

  acceptance_test:
    name: Acceptance test
    runs-on: ${{ needs.start-runner.outputs.label }} # run the job on the newly created runner
    needs: start-runner
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ${{ github.workspace }}/.cache/go-build
            ${{ github.workspace }}/go/pkg/mod
          key: go-ec2-${{ hashFiles('go.sum') }}
          restore-keys: go-ec2-

      - name: Set up Go
        run: |
          # Install the latest PATCH of the Go minor pinned by go.mod's `go`
          # directive (the EC2 runner lacks setup-go tooling), mirroring
          # check-latest: true in the check job. Patch bumps (1.26.3 -> 1.26.4)
          # are picked up automatically. A newer Go minor is not auto-adopted
          # and does not fail CI: we fall back to go.mod's exact version, which
          # is also the floor the module requires.
          go_required="$(awk '/^go / {print $2; exit}' go.mod)"
          go_minor="$(printf '%s' "${go_required}" | cut -d. -f1,2)"
          # go.dev/VERSION is Go's own latest-stable endpoint (text: goX.Y.Z);
          # when go.mod's minor is current it IS the latest patch.
          latest_go="$(curl -fsSL https://go.dev/VERSION?m=text | head -1 | sed 's/^go//')"
          latest_minor="$(printf '%s' "${latest_go}" | cut -d. -f1,2)"
          if [ -n "${latest_go}" ] && [ "${latest_minor}" = "${go_minor}" ]; then
            go_version="${latest_go}"   # latest patch in go.mod's minor series
          else
            go_version="${go_required}" # newer minor / lookup unavailable: use go.mod's exact version
          fi
          echo "Using Go ${go_version} (go.mod pins ${go_minor}.x)"
          tarball="go${go_version}.linux-amd64.tar.gz"
          curl -fsSLo "${tarball}" "https://dl.google.com/go/${tarball}"
          expected_go_sha="$(curl -fsSL "https://dl.google.com/go/${tarball}.sha256")"
          echo "${expected_go_sha}  ${tarball}" | sha256sum -c -
          rm -rf .go-instance
          mkdir .go-instance
          tar -C .go-instance -xzf "${tarball}"
          {
            echo '#!/bin/bash'
            echo
            echo 'export PATH="$PATH:'"$(pwd)"'/.go-instance/go/bin"'
            echo 'export HOME="'"$(pwd)"'"'
          } > go-env.sh
          chmod +x go-env.sh
          source go-env.sh
          go version
          go env GOPATH

      - name: Set up Terraform
        run: |
          # Pin the Terraform MINOR series, not an exact patch. CI auto-installs
          # the latest patch in this series, so patch bumps (1.15.5 -> 1.15.6)
          # are picked up automatically and never fail. A newer minor/major
          # release (1.16.0, 2.0.0) fails the build instead, so a maintainer can
          # review possible behavior changes before bumping tf_minor/tf_fallback.
          tf_minor="1.15"
          tf_fallback="1.15.5" # install target when the lookup is unavailable
          # checkpoint API == the source `terraform` itself uses for upgrade
          # notices (stable GA only, never RCs); current_version is the newest
          # stable, so when our series is current it IS the latest patch.
          latest_tf="$(curl -fsSL https://checkpoint-api.hashicorp.com/v1/check/terraform | sed -n 's/.*"current_version":"\([^"]*\)".*/\1/p')"
          latest_minor="${latest_tf%.*}"
          if [ -n "${latest_tf}" ] && [ "${latest_minor}" != "${tf_minor}" ] \
            && [ "$(printf '%s\n%s\n' "${tf_minor}" "${latest_minor}" | sort -V | tail -1)" = "${latest_minor}" ]; then
            echo "::error::A newer Terraform minor/major release exists (${latest_tf}, ${latest_minor}.x); pinned series is ${tf_minor}.x. Review changes and bump tf_minor/tf_fallback in .github/workflows/ci.yml."
            exit 1
          fi
          if [ -n "${latest_tf}" ] && [ "${latest_minor}" = "${tf_minor}" ]; then
            tf_version="${latest_tf}"   # latest patch in the pinned series
          else
            tf_version="${tf_fallback}" # lookup unavailable or lagging the series
          fi
          echo "Using Terraform ${tf_version} (pinned series ${tf_minor}.x)"
          curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/${tf_version}/terraform_${tf_version}_linux_amd64.zip"
          expected_tf_sha="$(curl -fsSL "https://releases.hashicorp.com/terraform/${tf_version}/terraform_${tf_version}_SHA256SUMS" | awk -v f="terraform_${tf_version}_linux_amd64.zip" '$2==f {print $1}')"
          echo "${expected_tf_sha}  terraform.zip" | sha256sum -c -
          rm -rf .terraform-bin
          mkdir .terraform-bin
          unzip -o terraform.zip -d .terraform-bin
          {
            echo 'export PATH="$PATH:'"$(pwd)"'/.terraform-bin"'
            echo 'export TF_ACC_TERRAFORM_PATH="'"$(pwd)"'/.terraform-bin/terraform"'
          } >> go-env.sh
          source go-env.sh
          terraform version

      - name: Acceptance Test
        run: |
          export CGO_ENABLED=0
          source go-env.sh
          make testacc
        env:
          NAMECHEAP_USER_NAME: saTerraformProvider
          NAMECHEAP_API_USER: saTerraformProvider
          NAMECHEAP_TEST_DOMAIN: terraform-provider-test.net
          NAMECHEAP_USE_SANDBOX: true
          NAMECHEAP_API_KEY: ${{ secrets.NAMECHEAP_API_KEY }}

  stop-runner:
    name: Stop self-hosted EC2 runner
    needs:
      - start-runner
      - acceptance_test
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-runner.outputs.ec2-instance-id != '' }} # stop the runner only if it was actually started
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Stop EC2 runner
        uses: namecheap/ec2-github-runner@ee454b5f2ada8a0a3c6b3b5e48f3275068254428 # v3.0.0 @ 2026-06-09
        with:
          mode: stop
          github-token: ${{ steps.app-token.outputs.token }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}
