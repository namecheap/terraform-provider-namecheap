name: CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

# Only one EC2 runner can be active at a time because all runs share
# the same whitelisted Elastic IP. Queued runs wait for the current one
# to finish (cancel-in-progress: false).
concurrency:
  group: ec2-acceptance-test
  cancel-in-progress: false

jobs:

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.9

      - name: Check
        run: make check

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          skip-cache: true

      - name: Test
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  start-runner:
    name: Start self-hosted EC2 runner
    needs: check
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Start EC2 runner
        id: start-ec2-runner
        uses: namecheap/ec2-github-runner@feat/al2023-support
        with:
          mode: start
          github-token: ${{ secrets.GH_TOKEN }}
          ec2-image-owner: 699717368611
          ec2-image-filters: >
            [
              { "Name": "name", "Values": ["nc-al2023-ami-hvm-x86_64-master-*"] }
            ]
          ec2-instance-type: t3.medium
          subnet-id: subnet-01c4ff5a
          security-group-id: sg-106ec76d
          eip-allocation-id: eipalloc-1796f61b
          iam-role-name: AmazonSSMRoleForInstancesQuickSetup
          aws-resource-tags: >
            [
              { "Key": "Name", "Value": "github_runner" },
              { "Key": "GitHubRepository", "Value": "${{ github.repository }}" }
            ]

  acceptance_test:
    name: Acceptance test
    runs-on: ${{ needs.start-runner.outputs.label }} # run the job on the newly created runner
    needs: start-runner
    steps:
      - uses: actions/checkout@v4 # pinned to v4 (node20) — self-hosted EC2 runner doesn't support node24 yet

      - name: Set up Go
        run: |
          curl -fsSLo go1.25.9.linux-amd64.tar.gz https://dl.google.com/go/go1.25.9.linux-amd64.tar.gz
          rm -rf .go-instance
          mkdir .go-instance
          tar -C .go-instance -xzf go1.25.9.linux-amd64.tar.gz
          {
            echo '#!/bin/bash'
            echo
            echo 'export PATH="$PATH:'"$(pwd)"'/.go-instance/go/bin"'
            echo 'export HOME="'"$(pwd)"'"'
          } > go-env.sh
          chmod +x go-env.sh
          source go-env.sh
          go version
          go env GOPATH

      - name: Set up Terraform
        run: |
          curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.14.8/terraform_1.14.8_linux_amd64.zip
          rm -rf .terraform-bin
          mkdir .terraform-bin
          unzip -o terraform.zip -d .terraform-bin
          {
            echo 'export PATH="$PATH:'"$(pwd)"'/.terraform-bin"'
            echo 'export TF_ACC_TERRAFORM_PATH="'"$(pwd)"'/.terraform-bin/terraform"'
          } >> go-env.sh
          source go-env.sh
          terraform version

      - name: Acceptance Test
        run: |
          export CGO_ENABLED=0
          source go-env.sh
          make testacc
        env:
          NAMECHEAP_USER_NAME: saTerraformProvider
          NAMECHEAP_API_USER: saTerraformProvider
          NAMECHEAP_TEST_DOMAIN: terraform-provider-test.net
          NAMECHEAP_USE_SANDBOX: true
          NAMECHEAP_API_KEY: ${{ secrets.NAMECHEAP_API_KEY }}

  stop-runner:
    name: Stop self-hosted EC2 runner
    needs:
      - start-runner
      - acceptance_test
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-runner.outputs.ec2-instance-id != '' }} # stop the runner only if it was actually started
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Stop EC2 runner
        uses: namecheap/ec2-github-runner@main
        with:
          mode: stop
          github-token: ${{ secrets.GH_TOKEN }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}
