name: CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

# Only one EC2 runner can be active at a time because all runs share
# the same whitelisted Elastic IP. Queued runs wait for the current one
# to finish (cancel-in-progress: false).
concurrency:
  group: ec2-acceptance-test
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify module integrity
        run: go mod verify

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check
        run: make check

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

      - name: Test
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    # Trivy scan covers three concerns in one job:
    #  - SCA: CVEs in Go dependencies declared by go.mod / go.sum.
    #  - IaC: misconfigurations in any Terraform or YAML at the
    #    repo root (examples/, .github/workflows/, etc.).
    #  - Secret scan: accidental tokens or keys checked into the tree.
    # A separate step emits a CycloneDX SBOM as a workflow artifact so
    # downstream tooling (dependency-track, release provenance, legal
    # audits) can consume a signed inventory without re-running scans.
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy vuln + misconfig + secret + license scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret,license
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          # License denylist lives in trivy.yaml at repo root; the
          # action auto-loads it before each scanner runs.
          trivy-config: trivy.yaml
          # trivy-action v0.36.0 uses actions/cache@v5 (Node 24) internally.
          cache: "true"

      - name: Generate CycloneDX SBOM
        # Runs even if the scan above found HIGH/CRITICAL — the SBOM is
        # a static inventory and should be produced regardless of
        # gating outcome so consumers can see what went into the tree.
        if: ${{ !cancelled() }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          cache: "true"

      - name: Upload SBOM artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

  start-runner:
    name: Start self-hosted EC2 runner
    needs: [check, security]
    # Dependabot-triggered runs don't have access to secrets.* (GitHub
    # redacts them for dependabot[bot]), so start-runner and the
    # acceptance test would fail at "Configure AWS credentials". Skip
    # those jobs for Dependabot; the check job still runs on its PRs.
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Start EC2 runner
        id: start-ec2-runner
        uses: namecheap/ec2-github-runner@8966982af3f7a32ee64a117f181377a28622146b # main @ 2026-05-15
        with:
          mode: start
          github-token: ${{ steps.app-token.outputs.token }}
          ec2-image-owner: 699717368611
          ec2-image-filters: >
            [
              { "Name": "name", "Values": ["nc-al2023-ami-hvm-x86_64-master-*"] }
            ]
          ec2-instance-type: t3.medium
          subnet-id: subnet-01c4ff5a
          security-group-id: sg-106ec76d
          eip-allocation-id: eipalloc-1796f61b
          iam-role-name: AmazonSSMRoleForInstancesQuickSetup
          # SSE-EBS on the runner's root volume. Uses the launch
          # account's default aws/ebs KMS key; AMI snapshot-id is
          # dropped so AWS re-encrypts at launch time.
          encrypt-ebs: "true"
          aws-resource-tags: >
            [
              { "Key": "Name", "Value": "github_runner" },
              { "Key": "GitHubRepository", "Value": "${{ github.repository }}" }
            ]

  acceptance_test:
    name: Acceptance test
    runs-on: ${{ needs.start-runner.outputs.label }} # run the job on the newly created runner
    needs: start-runner
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ${{ github.workspace }}/.cache/go-build
            ${{ github.workspace }}/go/pkg/mod
          key: go-ec2-${{ hashFiles('go.sum') }}
          restore-keys: go-ec2-

      - name: Set up Go
        run: |
          # Derive the Go version from go.mod's `go` directive so this manual
          # install (the EC2 runner lacks setup-go tooling) can never drift
          # from the module requirement the way the release workflow did.
          go_version="$(awk '/^go / {print $2; exit}' go.mod)"
          tarball="go${go_version}.linux-amd64.tar.gz"
          curl -fsSLo "${tarball}" "https://dl.google.com/go/${tarball}"
          expected_go_sha="$(curl -fsSL "https://dl.google.com/go/${tarball}.sha256")"
          echo "${expected_go_sha}  ${tarball}" | sha256sum -c -
          rm -rf .go-instance
          mkdir .go-instance
          tar -C .go-instance -xzf "${tarball}"
          {
            echo '#!/bin/bash'
            echo
            echo 'export PATH="$PATH:'"$(pwd)"'/.go-instance/go/bin"'
            echo 'export HOME="'"$(pwd)"'"'
          } > go-env.sh
          chmod +x go-env.sh
          source go-env.sh
          go version
          go env GOPATH

      - name: Set up Terraform
        run: |
          curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.14.8/terraform_1.14.8_linux_amd64.zip
          expected_tf_sha="$(curl -fsSL https://releases.hashicorp.com/terraform/1.14.8/terraform_1.14.8_SHA256SUMS | awk '/terraform_1.14.8_linux_amd64.zip$/ {print $1}')"
          echo "${expected_tf_sha}  terraform.zip" | sha256sum -c -
          rm -rf .terraform-bin
          mkdir .terraform-bin
          unzip -o terraform.zip -d .terraform-bin
          {
            echo 'export PATH="$PATH:'"$(pwd)"'/.terraform-bin"'
            echo 'export TF_ACC_TERRAFORM_PATH="'"$(pwd)"'/.terraform-bin/terraform"'
          } >> go-env.sh
          source go-env.sh
          terraform version

      - name: Acceptance Test
        run: |
          export CGO_ENABLED=0
          source go-env.sh
          make testacc
        env:
          NAMECHEAP_USER_NAME: saTerraformProvider
          NAMECHEAP_API_USER: saTerraformProvider
          NAMECHEAP_TEST_DOMAIN: terraform-provider-test.net
          NAMECHEAP_USE_SANDBOX: true
          NAMECHEAP_API_KEY: ${{ secrets.NAMECHEAP_API_KEY }}

  stop-runner:
    name: Stop self-hosted EC2 runner
    needs:
      - start-runner
      - acceptance_test
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-runner.outputs.ec2-instance-id != '' }} # stop the runner only if it was actually started
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Stop EC2 runner
        uses: namecheap/ec2-github-runner@8966982af3f7a32ee64a117f181377a28622146b # main @ 2026-05-15
        with:
          mode: stop
          github-token: ${{ steps.app-token.outputs.token }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}
