name: Export GPG Public Key

# One-off utility workflow: imports the GPG private key from repo secrets and
# prints/uploads the corresponding PUBLIC key. The public key is non-sensitive
# (it's meant to be published to keyservers, KEYS files, etc.) so emitting it
# to logs and artifacts is safe.
#
# DELETE THIS FILE after the public key has been retrieved.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-public-key:
    runs-on: ubuntu-latest
    steps:
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: List keys in keyring
        run: |
          echo "=== Public keys ==="
          gpg --list-keys --keyid-format=long
          echo
          echo "=== Secret keys (metadata only, no material) ==="
          gpg --list-secret-keys --keyid-format=long

      - name: Export public key (ASCII-armored)
        id: export
        run: |
          fpr="${{ steps.import_gpg.outputs.fingerprint }}"
          echo "Exporting public key for fingerprint: ${fpr}"
          mkdir -p out
          gpg --export --armor "${fpr}" > "out/public-key-${fpr}.asc"

          echo
          echo "=== BEGIN PUBLIC KEY (safe to copy from logs) ==="
          cat "out/public-key-${fpr}.asc"
          echo "=== END PUBLIC KEY ==="

      - name: Upload public key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpg-public-key
          path: out/*.asc
          retention-days: 1
